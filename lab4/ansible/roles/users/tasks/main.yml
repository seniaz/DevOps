---
- name: Create teacher user
  ansible.builtin.user:
    name: teacher
    shell: /bin/bash
    groups: sudo
    append: true
    password: "{{ teacher_password | password_hash('sha512') }}"
    update_password: on_create

- name: Force teacher password change on first login
  ansible.builtin.command:
    cmd: chage -d 0 teacher
  changed_when: false

- name: Create student user
  ansible.builtin.user:
    name: student
    shell: /bin/bash
    groups: sudo
    append: true
  when: "'workers' in group_names"

- name: Create app system user
  ansible.builtin.user:
    name: "{{ app_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  when: "'workers' in group_names"

- name: Create operator user
  ansible.builtin.user:
    name: operator
    shell: /bin/bash
    password: "{{ operator_password | password_hash('sha512') }}"
    update_password: on_create
  when: "'workers' in group_names"

- name: Force operator password change on first login
  ansible.builtin.command:
    cmd: chage -d 0 operator
  changed_when: false
  when: "'workers' in group_names"

- name: Configure operator sudo rules
  ansible.builtin.template:
    src: operator_sudoers.j2
    dest: /etc/sudoers.d/operator
    mode: "0440"
    validate: "visudo -cf %s"
  when: "'workers' in group_names"
