---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - ufw
      - python3
      - python3-pip
    state: present

- name: Set timezone
  community.general.timezone:
    name: Europe/Kyiv
