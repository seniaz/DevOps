---
- name: Install Python and pip
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Create application directory
  ansible.builtin.file:
    path: /opt/{{ app_name }}
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Copy application code
  ansible.builtin.copy:
    src: app.py
    dest: /opt/{{ app_name }}/app.py
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"
  notify: Restart webapp

- name: Copy requirements.txt
  ansible.builtin.copy:
    src: requirements.txt
    dest: /opt/{{ app_name }}/requirements.txt
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/{{ app_name }}/venv
    creates: /opt/{{ app_name }}/venv/bin/activate

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /opt/{{ app_name }}/requirements.txt
    virtualenv: /opt/{{ app_name }}/venv

- name: Set ownership on venv
  ansible.builtin.file:
    path: /opt/{{ app_name }}/venv
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: true

- name: Deploy systemd unit for webapp
  ansible.builtin.template:
    src: mywebapp.service.j2
    dest: /etc/systemd/system/{{ app_name }}.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart webapp

- name: Create gradebook file
  ansible.builtin.copy:
    content: "{{ gradebook_number }}"
    dest: /home/student/gradebook
    owner: student
    group: student
    mode: "0644"

- name: Enable and start webapp
  ansible.builtin.systemd:
    name: "{{ app_name }}"
    state: started
    enabled: true
    daemon_reload: true
