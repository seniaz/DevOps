services:
  db:
    image: mariadb:11
    container_name: inventory-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_secret
      MARIADB_DATABASE: inventory
      MARIADB_USER: inventory
      MARIADB_PASSWORD: inventory_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  webapp:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: inventory-webapp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  nginx:
    image: nginx:1.27-alpine
    container_name: inventory-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - appnet

volumes:
  db_data:
    driver: local

networks:
  appnet:
    driver: bridge
