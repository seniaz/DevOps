name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Target Node
    runs-on: self-hosted
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}:stable
          DB_PASS: ${{ secrets.DB_PASSWORD }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          ssh -i /opt/deploy_key -o StrictHostKeyChecking=no ansible@192.168.56.107 bash -s "$IMAGE_LOWER" "$DB_PASS" << 'SCRIPT'
          IMG="$1"
          DBPW="$2"
          echo "=== Pulling new image ==="
          sudo docker pull "$IMG"
          echo "=== Stopping current container ==="
          sudo systemctl stop mywebapp-container.service || true
          echo "=== Running migration ==="
          sudo docker run --rm --network host "$IMG" python migrate.py --db-host 127.0.0.1 --db-port 3306 --db-user mywebapp --db-password "$DBPW" --db-name mywebapp
          echo "=== Starting new container ==="
          sudo systemctl start mywebapp-container.service
          echo "=== Waiting for service ==="
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health/alive > /dev/null 2>&1; then
              echo "Service is UP!"
              exit 0
            fi
            sleep 2
          done
          echo "Service FAILED to start"
          exit 1
          SCRIPT

  verify:
    name: Verify Deployment
    runs-on: self-hosted
    needs: [deploy]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run verification
        env:
          TARGET_HOST: 192.168.56.107
          TARGET_USER: ansible
          KEY: /opt/deploy_key
        run: bash scripts/verify.sh
